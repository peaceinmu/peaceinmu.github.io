<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>努努大冒險</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    min-height: 100svh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(#bfe9ff, #f7f0d6);
    font-family: "Microsoft JhengHei", system-ui, sans-serif;
    overflow: hidden;
  }
  #gameWrap {
    width: min(960px, 96vw);
    text-align: center;
  }
  canvas {
    width: 100%;
    max-height: 70vh;
    background: linear-gradient(#92d8ff 0%, #c7f2ff 55%, #92d56f 56%, #61b94d 100%);
    border: 6px solid #fff4d8;
    border-radius: 22px;
    box-shadow: 0 16px 40px rgba(0,0,0,.18);
  }
  .hint {
    margin-top: 10px;
    color: #5f4b32;
    font-weight: 700;
  }
  #jumpBtn {
    display: none;
    margin: 12px auto 0;
    width: min(86vw, 360px);
    height: 58px;
    border: 0;
    border-radius: 999px;
    background: #fff4d8;
    color: #6b3f27;
    font: 900 22px "Microsoft JhengHei", system-ui, sans-serif;
    box-shadow: 0 8px 18px rgba(0,0,0,.16);
  }
  #jumpBtn:active { transform: translateY(2px); }
  @media (max-width: 700px) {
    body { align-items: flex-start; padding-top: 8px; }
    #gameWrap { width: 100vw; padding: 0 8px; }
    canvas { max-height: 68svh; border-width: 4px; border-radius: 16px; touch-action: none; }
    .hint { font-size: 14px; line-height: 1.4; }
    #jumpBtn { display: block; }
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="900" height="420"></canvas>
  <button id="jumpBtn" type="button">跳一下！</button>
  <div class="hint">電腦：空白鍵 / 滑鼠點擊　｜　手機：點畫面或按「跳一下！」</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const jumpBtn = document.getElementById('jumpBtn');

let state = 'start';
let score = 0;
let best = Number(localStorage.getItem('nunuBest') || 0);
let frame = 0;
let speed = 6;
let obstacles = [];
let coins = [];
let clouds = [];

const groundY = 315;
const dog = {
  x: 115, y: groundY - 72, w: 92, h: 72,
  vy: 0, gravity: 0.75, jump: -14.5,
  onGround: true
};

for (let i = 0; i < 5; i++) {
  clouds.push({ x: i * 210 + 60, y: 45 + Math.random() * 80, s: .7 + Math.random() * .6 });
}

function reset() {
  state = 'playing';
  score = 0; frame = 0; speed = 6;
  obstacles = []; coins = [];
  dog.y = groundY - dog.h; dog.vy = 0; dog.onGround = true;
}

function jump() {
  if (state === 'start' || state === 'gameover') { reset(); return; }
  if (dog.onGround) {
    dog.vy = dog.jump;
    dog.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
  if (e.key.toLowerCase() === 'r') reset();
});
function doJump(e) {
  if (e) e.preventDefault();
  jump();
}
canvas.addEventListener('pointerdown', doJump, { passive: false });
jumpBtn.addEventListener('pointerdown', doJump, { passive: false });
window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function spawn() {
  if (frame % Math.max(55, 95 - Math.floor(speed * 4)) === 0) {
    const h = 32 + Math.random() * 24;
    obstacles.push({ x: canvas.width + 20, y: groundY - h, w: 28 + Math.random() * 24, h });
  }
  if (frame % 90 === 35) {
    coins.push({ x: canvas.width + 20, y: 165 + Math.random() * 80, r: 13, got: false });
  }
}

function hit(a, b) {
  return a.x + 12 < b.x + b.w && a.x + a.w - 12 > b.x && a.y + 8 < b.y + b.h && a.y + a.h - 4 > b.y;
}

function update() {
  if (state !== 'playing') return;
  frame++;
  speed += 0.0025;
  score += 0.08;

  dog.vy += dog.gravity;
  dog.y += dog.vy;
  if (dog.y >= groundY - dog.h) {
    dog.y = groundY - dog.h;
    dog.vy = 0;
    dog.onGround = true;
  }

  spawn();

  obstacles.forEach(o => o.x -= speed);
  coins.forEach(c => c.x -= speed);
  clouds.forEach(c => {
    c.x -= 0.45 * c.s;
    if (c.x < -120) { c.x = canvas.width + 80; c.y = 40 + Math.random() * 95; }
  });

  obstacles = obstacles.filter(o => o.x > -80);
  coins = coins.filter(c => c.x > -40 && !c.got);

  for (const o of obstacles) {
    if (hit(dog, o)) {
      state = 'gameover';
      best = Math.max(best, Math.floor(score));
      localStorage.setItem('nunuBest', best);
    }
  }
  for (const c of coins) {
    const cx = Math.max(dog.x, Math.min(c.x, dog.x + dog.w));
    const cy = Math.max(dog.y, Math.min(c.y, dog.y + dog.h));
    if (Math.hypot(c.x - cx, c.y - cy) < c.r) {
      c.got = true;
      score += 12;
    }
  }
}

function drawCloud(c) {
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.beginPath();
  ctx.arc(c.x, c.y, 28*c.s, 0, Math.PI*2);
  ctx.arc(c.x+30*c.s, c.y-10*c.s, 34*c.s, 0, Math.PI*2);
  ctx.arc(c.x+65*c.s, c.y, 25*c.s, 0, Math.PI*2);
  ctx.fill();
}

function drawDog() {
  const x = dog.x, y = dog.y;
  ctx.save();
  const bob = dog.onGround ? Math.sin(frame/7)*2 : 0;
  ctx.translate(0, bob);

  // body white
  ctx.fillStyle = '#fffdf3';
  roundRect(x+18, y+28, 62, 34, 18);
  ctx.fill();

  // legs long and slim
  ctx.strokeStyle = '#fffdf3'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  const legSwing = dog.onGround ? Math.sin(frame/6)*6 : 0;
  line(x+34, y+58, x+30+legSwing, y+72);
  line(x+57, y+58, x+61-legSwing, y+72);

  // tail white with tiny spots
  ctx.strokeStyle = '#fffdf3'; ctx.lineWidth = 7;
  line(x+77, y+35, x+103, y+24);
  ctx.fillStyle = '#8a5a3c';
  ctx.beginPath(); ctx.arc(x+94, y+27, 2, 0, Math.PI*2); ctx.fill();

  // head brindle
  ctx.fillStyle = '#7a4a2d';
  ctx.beginPath();
  ctx.ellipse(x+26, y+24, 24, 22, 0, 0, Math.PI*2);
  ctx.fill();

  // ears
  ctx.fillStyle = '#6a3f28';
  ctx.beginPath();
  ctx.moveTo(x+9, y+9); ctx.lineTo(x+2, y-23); ctx.lineTo(x+25, y+3); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+33, y+7); ctx.lineTo(x+43, y-22); ctx.lineTo(x+48, y+12); ctx.fill();

  // white blaze snout
  ctx.fillStyle = '#fffdf3';
  ctx.beginPath();
  ctx.ellipse(x+23, y+28, 9, 19, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fffdf3';
  ctx.beginPath();
  ctx.ellipse(x+36, y+31, 14, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // eye nose collar
  ctx.fillStyle = '#1f1b18';
  ctx.beginPath(); ctx.arc(x+31, y+20, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+48, y+31, 3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#e85d75'; ctx.lineWidth = 5; line(x+47, y+38, x+58, y+43);
  ctx.fillStyle = '#f2c14e'; ctx.beginPath(); ctx.arc(x+59, y+47, 4, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  ctx.fillStyle = '#7b4b2a';
  roundRect(o.x, o.y, o.w, o.h, 8); ctx.fill();
  ctx.fillStyle = '#5fac4a';
  ctx.beginPath();
  ctx.ellipse(o.x + o.w/2, o.y, o.w*.7, 12, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawCoin(c) {
  ctx.fillStyle = '#ffd85a';
  ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ad7b12';
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('★', c.x, c.y+1);
}

function drawText() {
  ctx.fillStyle = '#5d4028';
  ctx.font = 'bold 28px Microsoft JhengHei';
  ctx.textAlign = 'left';
  ctx.fillText('努努大冒險', 24, 42);
  ctx.font = 'bold 22px Microsoft JhengHei';
  ctx.fillText('分數：' + Math.floor(score), 24, 76);
  ctx.fillText('最高：' + best, 24, 106);

  if (state === 'start') overlay('努努大冒險', '點一下開始！');
  if (state === 'gameover') overlay('努努撞到了！', '分數 ' + Math.floor(score) + '　｜　點一下再玩一次');
}

function overlay(title, sub) {
  ctx.fillStyle = 'rgba(255, 248, 226, .88)';
  roundRect(210, 110, 480, 170, 26); ctx.fill();
  ctx.fillStyle = '#6b3f27';
  ctx.textAlign = 'center';
  ctx.font = 'bold 44px Microsoft JhengHei';
  ctx.fillText(title, 450, 175);
  ctx.font = 'bold 24px Microsoft JhengHei';
  ctx.fillText(sub, 450, 225);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  clouds.forEach(drawCloud);

  // grass lines
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2;
  for (let x = -20 + (frame * speed % 60); x < canvas.width; x += 60) line(x, groundY+38, x+28, groundY+22);

  coins.forEach(drawCoin);
  obstacles.forEach(drawObstacle);
  drawDog();
  drawText();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
function line(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
